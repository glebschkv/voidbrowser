name: Build Windows Installer

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.18.1"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "10.29.3"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.84.1"

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Run frontend build
        run: pnpm build

      - name: Run cargo clippy
        working-directory: src-tauri
        run: cargo clippy -- -D warnings

      - name: Run cargo test
        working-directory: src-tauri
        run: cargo test

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tauriScript: pnpm tauri
          tagName: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || '' }}
          releaseName: ${{ startsWith(github.ref, 'refs/tags/') && format('VoidBrowser {0}', github.ref_name) || '' }}
          releaseBody: |
            ## VoidBrowser ${{ github.ref_name }}

            A zero-tracking privacy browser for Windows.

            ### Features
            - Ad and tracker blocking (EasyList + EasyPrivacy)
            - Fingerprint resistance
            - HTTPS-only mode
            - Encrypted bookmarks and settings
            - Ephemeral browsing — all data destroyed on exit
            - WebRTC leak prevention

            ### Install
            Download the `.exe` installer below and run it.
          releaseDraft: false
          prerelease: false

      - name: Upload installer artifact
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v4
        with:
          name: voidbrowser-windows-installer
          path: src-tauri/target/release/bundle/nsis/*.exe
